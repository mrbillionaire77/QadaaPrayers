name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ────────────────────────────────────────────
      # 1. Checkout
      # ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────
      # 2. Node.js 20 LTS
      # ────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ────────────────────────────────────────────
      # 3. Java 17 (required by AGP 8.x)
      # ────────────────────────────────────────────
      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ────────────────────────────────────────────
      # 4. Accept Android SDK licenses
      # ────────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ────────────────────────────────────────────
      # 5. Install npm dependencies
      # ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ────────────────────────────────────────────
      # 6. Expo Prebuild → generates /android folder
      # ────────────────────────────────────────────
      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install

      # ────────────────────────────────────────────
      # 7. Grant Gradle execute permission
      # ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ────────────────────────────────────────────
      # 8. Build Debug APK
      # ────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g'

      # ────────────────────────────────────────────
      # 9. Upload APK as artifact (تحميل من GitHub)
      # ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qadaa-prayers-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ────────────────────────────────────────────
      # 10. (اختياري) Release APK بـ Keystore
      #     فعّل هذه الخطوة عند رفع Secrets
      # ────────────────────────────────────────────
      # - name: Build Release APK
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   working-directory: android
      #   run: ./gradlew assembleRelease --no-daemon
      #   env:
      #     ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
      #     ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      #     ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      #     ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
