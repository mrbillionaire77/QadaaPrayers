name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy PWA
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Deploy pwa/ folder to GitHub Pages ──
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pwa
          force_orphan: true
          commit_message: "Deploy PWA [skip ci]"
