<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1F4A3A" />
  <meta name="description" content="تطبيق لتتبع الصلوات الفائتة وقضائها" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="قضاء الصلوات" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <title>قضاء الصلوات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1F4A3A;
      --primary-dark:  #163529;
      --gold:          #C5A028;
      --gold-light:    #D4B84A;
      --beige:         #F5F0E6;
      --card:          #FFFFFF;
      --text:          #1A2E23;
      --text-sec:      #5A6B62;
      --text-muted:    #9AA89F;
      --border:        #E8E2D4;
      --danger:        #B5433A;
      --shadow:        rgba(31,74,58,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: var(--beige);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--primary);
      padding: 48px 16px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .header-actions {
      position: absolute;
      top: 52px;
      left: 16px;
    }

    .btn-reset {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(197,160,40,0.18);
      color: var(--gold);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-reset:active { transform: scale(0.93); background: rgba(197,160,40,0.32); }

    .mosque-icon {
      width: 72px;
      height: 72px;
      margin-bottom: 8px;
      object-fit: contain;
    }

    .header-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .header-date {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
    }

    /* ── TOTAL CARD ── */
    .total-card {
      background: var(--primary);
      margin: 0 16px;
      border-radius: 18px;
      padding: 18px 24px;
      text-align: center;
      border: 1.5px solid rgba(197,160,40,0.35);
      margin-bottom: 4px;
    }

    .total-number {
      font-size: 52px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -1px;
    }

    .total-label {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      background: var(--beige);
      padding: 16px 16px 110px;
      -webkit-overflow-scrolling: touch;
    }

    .section-gap { height: 12px; }

    /* ── PRAYERS CARD ── */
    .prayers-card {
      background: var(--card);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow);
      margin-bottom: 14px;
    }

    .prayer-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .prayer-row:last-child { border-bottom: none; }

    .prayer-info { flex: 1; text-align: right; }

    .prayer-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .prayer-time {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .counter-section {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .count-display {
      min-width: 64px;
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 8px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .count-display:active { background: var(--beige); }

    .ctrl-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      line-height: 1;
    }

    .ctrl-btn:active { transform: scale(0.88); opacity: 0.8; }

    .ctrl-increment { background: var(--primary); color: #fff; }
    .ctrl-decrement { background: var(--border); color: var(--text-sec); }
    .ctrl-decrement:disabled { opacity: 0.35; cursor: default; }

    /* ── VERSE CARD ── */
    .verse-card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px 20px 16px;
      text-align: center;
      box-shadow: 0 1px 6px var(--shadow);
      margin-bottom: 10px;
    }

    .verse-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.7;
    }

    .app-tag {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .tip {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px;
    }

    /* ── SHARE FAB ── */
    .share-fab {
      position: fixed;
      bottom: 24px;
      left: 16px;
      right: 16px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 16px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(197,160,40,0.45);
      transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      z-index: 100;
    }

    .share-fab:active { transform: scale(0.97); opacity: 0.88; }

    /* ── EDIT MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: var(--card);
      border-radius: 22px;
      padding: 24px 20px;
      width: min(300px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transform: scale(0.95) translateY(12px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .modal-input {
      width: 100%;
      border: 2px solid var(--primary);
      border-radius: 12px;
      padding: 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      outline: none;
    }

    .modal-input:focus { border-color: var(--gold); }

    .modal-btns {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .modal-btn:active { opacity: 0.8; }
    .modal-btn-cancel { background: var(--border); color: var(--text-sec); }
    .modal-btn-confirm { background: var(--primary); color: #fff; }

    /* ── SHARE MODAL ── */
    .share-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: flex-end;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .share-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .share-modal {
      background: var(--beige);
      border-radius: 26px 26px 0 0;
      width: 100%;
      max-height: 92dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }

    .share-modal-overlay.open .share-modal {
      transform: translateY(0);
    }

    .share-modal-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .share-modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
      flex: 1;
      text-align: center;
    }

    .share-modal-close,
    .share-modal-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    .share-modal-close { background: var(--border); color: var(--text-sec); }
    .share-modal-send { background: rgba(197,160,40,0.18); color: var(--gold); }
    .share-modal-close:active, .share-modal-send:active { opacity: 0.7; }

    .share-modal-body {
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── SHAREABLE CARD ── */
    .shareable-card {
      background: var(--beige);
      border-radius: 20px;
      padding: 24px 20px;
      width: 100%;
      max-width: 360px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .sc-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }

    .sc-icon { width: 60px; height: 60px; object-fit: contain; margin-bottom: 8px; }
    .sc-title { font-size: 22px; font-weight: 800; color: var(--primary); }
    .sc-date { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .sc-total-box {
      background: var(--primary);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      margin-bottom: 14px;
    }

    .sc-total-num { font-size: 40px; font-weight: 900; color: var(--gold); line-height: 1; }
    .sc-total-lbl { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 4px; }

    .sc-rows { display: flex; flex-direction: column; gap: 0; }

    .sc-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sc-row:last-child { border-bottom: none; }
    .sc-row-name { font-size: 16px; font-weight: 700; color: var(--primary); }
    .sc-row-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .sc-row-count { font-size: 20px; font-weight: 900; color: var(--text); }

    .sc-rows-card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .sc-verse { text-align: center; font-size: 14px; font-weight: 700; color: var(--primary); line-height: 1.8; }
    .sc-app-tag { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    .share-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 0 16px;
    }

    /* ── NOTIFY PERMISSION BANNER ── */
    .notify-banner {
      background: rgba(31,74,58,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .notify-banner-text { font-size: 13px; color: var(--text-sec); flex: 1; }
    .notify-banner-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    @media (max-width: 400px) {
      .total-number { font-size: 44px; }
      .ctrl-btn { width: 34px; height: 34px; font-size: 20px; }
      .count-display { font-size: 22px; min-width: 56px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-actions">
    <button class="btn-reset" id="btnReset" title="إعادة تعيين" aria-label="إعادة تعيين">↺</button>
  </div>
  <img class="mosque-icon" src="mosque-icon.svg" alt="مسجد" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2250%22 font-size=%2248%22>🕌</text></svg>'" />
  <h1 class="header-title">قضاء الصلوات</h1>
  <p class="header-date" id="headerDate"></p>
</header>

<!-- ── SCROLL AREA ── -->
<main class="scroll-area">

  <!-- Total -->
  <div class="total-card" id="totalCard">
    <div class="total-number" id="totalNumber">0</div>
    <div class="total-label">صلاة متبقية إجمالاً</div>
  </div>

  <div class="section-gap"></div>

  <!-- Notify Banner -->
  <div class="notify-banner" id="notifyBanner" style="display:none">
    <span class="notify-banner-text">فعّل الإشعارات لتلقي تذكير يومي بالصلوات الفائتة</span>
    <button class="notify-banner-btn" id="btnEnableNotify">تفعيل</button>
  </div>

  <!-- Prayers Card -->
  <div class="prayers-card" id="prayersCard"></div>

  <!-- Verse -->
  <div class="verse-card">
    <p class="verse-text">﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾</p>
    <p class="app-tag">تطبيق قضاء الصلوات</p>
  </div>

  <p class="tip">اضغط على الرقم لتعديله مباشرةً</p>
</main>

<!-- ── SHARE FAB ── -->
<button class="share-fab" id="btnShare">
  <span>⎙</span>
  <span>مشاركة التقرير</span>
</button>

<!-- ── EDIT MODAL ── -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <h2 class="modal-title" id="editModalTitle">تعديل العداد</h2>
    <input class="modal-input" id="editInput" type="number" inputmode="numeric" min="0" autocomplete="off" />
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="editCancel">إلغاء</button>
      <button class="modal-btn modal-btn-confirm" id="editConfirm">تأكيد</button>
    </div>
  </div>
</div>

<!-- ── SHARE MODAL ── -->
<div class="share-modal-overlay" id="shareModal" role="dialog" aria-modal="true">
  <div class="share-modal">
    <div class="share-modal-header">
      <button class="share-modal-close" id="shareModalClose" aria-label="إغلاق">✕</button>
      <span class="share-modal-title">معاينة التقرير</span>
      <button class="share-modal-send" id="shareModalSend" aria-label="مشاركة">⎙</button>
    </div>
    <div class="share-modal-body">
      <div class="shareable-card" id="shareableCard"></div>
      <p class="share-hint">اضغط ⎙ لمشاركة النص، أو صوّر الشاشة لمشاركة الصورة</p>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const STORAGE_KEY = 'prayer_tracker_data_v1';

const PRAYERS = [
  { id: 'fajr',    name: 'الفجر',   time: 'قبل الشروق'     },
  { id: 'dhuhr',   name: 'الظهر',   time: 'منتصف النهار'   },
  { id: 'asr',     name: 'العصر',   time: 'بعد الظهر'      },
  { id: 'maghrib', name: 'المغرب',  time: 'عند الغروب'     },
  { id: 'isha',    name: 'العشاء',  time: 'بعد العشاء'     },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state = {
  version: 1,
  lastUpdated: new Date().toISOString(),
  lastInteractionDate: '',
  prayers: { fajr: 0, dhuhr: 0, asr: 0, maghrib: 0, isha: 0 },
};

// ══════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...state, ...parsed, prayers: { ...state.prayers, ...parsed.prayers } };
    }
  } catch { /* ignore */ }
}

function saveData() {
  try {
    state.lastUpdated = new Date().toISOString();
    state.lastInteractionDate = new Date().toISOString().split('T')[0];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch { /* ignore */ }
}

// ══════════════════════════════════════════════
//  UPDATE LOGIC
// ══════════════════════════════════════════════
function updateCount(prayerId, delta) {
  const current = state.prayers[prayerId] ?? 0;
  const next = current + delta;
  if (next < 0) return; // prevent negative
  state.prayers[prayerId] = next;
  saveData();
  renderCounters();
  renderTotal();
}

function setCount(prayerId, value) {
  const clamped = Math.max(0, parseInt(value, 10) || 0);
  state.prayers[prayerId] = clamped;
  saveData();
  renderCounters();
  renderTotal();
}

function resetAll() {
  if (!confirm('هل تريد إعادة تعيين جميع الصلوات إلى الصفر؟')) return;
  PRAYERS.forEach(p => { state.prayers[p.id] = 0; });
  saveData();
  renderCounters();
  renderTotal();
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function getTotal() {
  return Object.values(state.prayers).reduce((s, v) => s + v, 0);
}

function formatAr(n) {
  return n.toLocaleString('ar-EG');
}

function renderTotal() {
  document.getElementById('totalNumber').textContent = formatAr(getTotal());
}

function renderCounters() {
  PRAYERS.forEach(p => {
    const el = document.getElementById('count_' + p.id);
    if (el) el.textContent = formatAr(state.prayers[p.id] ?? 0);
    const decBtn = document.getElementById('dec_' + p.id);
    if (decBtn) decBtn.disabled = (state.prayers[p.id] ?? 0) <= 0;
  });
}

function buildPrayersCard() {
  const card = document.getElementById('prayersCard');
  card.innerHTML = '';
  PRAYERS.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.innerHTML = `
      <div class="prayer-info">
        <div class="prayer-name">${p.name}</div>
        <div class="prayer-time">${p.time}</div>
      </div>
      <div class="counter-section">
        <button class="ctrl-btn ctrl-increment" id="inc_${p.id}" aria-label="زيادة ${p.name}">+</button>
        <div class="count-display" id="count_${p.id}" role="button" tabindex="0" aria-label="تعديل ${p.name}">0</div>
        <button class="ctrl-btn ctrl-decrement" id="dec_${p.id}" aria-label="إنقاص ${p.name}" disabled>−</button>
      </div>`;
    card.appendChild(row);

    // Events
    row.querySelector('#inc_' + p.id).addEventListener('click', () => updateCount(p.id, 1));
    row.querySelector('#dec_' + p.id).addEventListener('click', () => updateCount(p.id, -1));
    row.querySelector('#count_' + p.id).addEventListener('click', () => openEditModal(p));
    row.querySelector('#count_' + p.id).addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') openEditModal(p);
    });
  });
}

// ══════════════════════════════════════════════
//  EDIT MODAL
// ══════════════════════════════════════════════
let currentEditId = null;

function openEditModal(prayer) {
  currentEditId = prayer.id;
  document.getElementById('editModalTitle').textContent = 'تعديل عدد ' + prayer.name;
  document.getElementById('editInput').value = state.prayers[prayer.id] ?? 0;
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editInput').focus(), 120);
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  currentEditId = null;
}

function confirmEdit() {
  if (!currentEditId) return;
  setCount(currentEditId, document.getElementById('editInput').value);
  closeEditModal();
}

document.getElementById('editCancel').addEventListener('click', closeEditModal);
document.getElementById('editConfirm').addEventListener('click', confirmEdit);
document.getElementById('editInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmEdit();
  if (e.key === 'Escape') closeEditModal();
});
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEditModal();
});

// ══════════════════════════════════════════════
//  SHAREABLE CARD
// ══════════════════════════════════════════════
function buildShareableCard() {
  const dateStr = new Date().toLocaleDateString('ar-SA', {
    year: 'numeric', month: 'long', day: 'numeric',
  });
  const rows = PRAYERS.map(p => `
    <div class="sc-row">
      <div>
        <div class="sc-row-name">${p.name}</div>
        <div class="sc-row-time">${p.time}</div>
      </div>
      <div class="sc-row-count">${formatAr(state.prayers[p.id] ?? 0)}</div>
    </div>`).join('');

  document.getElementById('shareableCard').innerHTML = `
    <div class="sc-header">
      <img class="sc-icon" src="mosque-icon.svg" alt="مسجد"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2250%22 font-size=%2248%22>🕌</text></svg>'" />
      <div class="sc-title">قضاء الصلوات</div>
      <div class="sc-date">${dateStr}</div>
    </div>
    <div class="sc-total-box">
      <div class="sc-total-num">${formatAr(getTotal())}</div>
      <div class="sc-total-lbl">صلاة متبقية إجمالاً</div>
    </div>
    <div class="sc-rows-card">
      <div class="sc-rows">${rows}</div>
    </div>
    <div class="sc-verse">﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾</div>
    <div class="sc-app-tag">تطبيق قضاء الصلوات</div>
  `;
}

// ══════════════════════════════════════════════
//  SHARE MODAL
// ══════════════════════════════════════════════
document.getElementById('btnShare').addEventListener('click', () => {
  buildShareableCard();
  document.getElementById('shareModal').classList.add('open');
});

document.getElementById('shareModalClose').addEventListener('click', () => {
  document.getElementById('shareModal').classList.remove('open');
});

document.getElementById('shareModal').addEventListener('click', e => {
  if (e.target === e.currentTarget)
    document.getElementById('shareModal').classList.remove('open');
});

document.getElementById('shareModalSend').addEventListener('click', async () => {
  const dateStr = new Date().toLocaleDateString('ar-SA', {
    year: 'numeric', month: 'long', day: 'numeric',
  });
  const lines = PRAYERS.map(p => `${p.name}: ${state.prayers[p.id] ?? 0} صلاة`).join('\n');
  const text = [
    `🕌 قضاء الصلوات — ${dateStr}`,
    ``,
    `إجمالي الصلوات المتبقية: ${getTotal()}`,
    ``,
    lines,
    ``,
    `﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾`,
    `تطبيق قضاء الصلوات`,
  ].join('\n');

  if (navigator.share) {
    try { await navigator.share({ title: 'تقرير الصلوات الفائتة', text }); } catch { /* cancelled */ }
  } else {
    try { await navigator.clipboard.writeText(text); alert('تم نسخ التقرير! يمكنك لصقه في أي تطبيق.'); }
    catch { alert(text); }
  }
});

// ══════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════
document.getElementById('btnReset').addEventListener('click', resetAll);

// ══════════════════════════════════════════════
//  DATE
// ══════════════════════════════════════════════
function renderDate() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ar-SA', {
    year: 'numeric', month: 'long', day: 'numeric',
  });
}

// ══════════════════════════════════════════════
//  NOTIFICATIONS
// ══════════════════════════════════════════════
function checkNotifyBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notifyBanner').style.display = 'flex';
  }
}

document.getElementById('btnEnableNotify').addEventListener('click', async () => {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  document.getElementById('notifyBanner').style.display = 'none';
  if (perm === 'granted') scheduleNotifications();
});

function scheduleNotifications() {
  if (!('serviceWorker' in navigator)) return;
  // Register SW for push / background notifications
  navigator.serviceWorker.ready.then(reg => {
    // Notifications are handled by SW
  });
}

function maybeShowNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toISOString().split('T')[0];
  const lastInteraction = state.lastInteractionDate;
  if (lastInteraction && lastInteraction >= today) return; // already interacted today
  // Only show if after 8 PM
  const hour = new Date().getHours();
  if (hour >= 20) {
    new Notification('تذكير — قضاء الصلوات', {
      body: 'هل قمت بتسجيل صلواتك الفائتة اليوم؟',
      icon: 'icon-192.png',
      badge: 'icon-192.png',
    });
  }
}

// ══════════════════════════════════════════════
//  SERVICE WORKER
// ══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
loadData();
renderDate();
buildPrayersCard();
renderCounters();
renderTotal();
checkNotifyBanner();
maybeShowNotification();
</script>
