<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1F4A3A" />
  <meta name="description" content="تطبيق لتتبع الصلوات الفائتة وقضائها" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="قضاء الصلوات" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="mosque-icon.svg" />
  <link rel="icon" href="mosque-icon.svg" />
  <title>قضاء الصلوات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #1F4A3A;
      --primary-dark: #163529;
      --gold:         #C5A028;
      --gold-light:   #D4B84A;
      --beige:        #F5F0E6;
      --card:         #FFFFFF;
      --text:         #1A2E23;
      --text-sec:     #5A6B62;
      --text-muted:   #9AA89F;
      --border:       #E8E2D4;
      --danger:       #B5433A;
      --danger-bg:    #FFF0EF;
      --info-bg:      rgba(31,74,58,0.07);
      --shadow:       rgba(31,74,58,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: var(--beige);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ══ HEADER ══ */
    .header {
      background: var(--primary);
      padding: 48px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .header-actions {
      position: absolute;
      top: 52px;
      left: 16px;
      display: flex;
      gap: 8px;
    }
    .header-icon-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(197,160,40,0.18);
      color: var(--gold);
      font-size: 19px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .header-icon-btn:active { transform: scale(0.92); background: rgba(197,160,40,0.32); }

    .mosque-icon { width: 68px; height: 68px; margin-bottom: 6px; object-fit: contain; }
    .header-title { font-size: 25px; font-weight: 800; color: #fff; }
    .header-date { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 3px; }

    /* ══ TOTAL CARD ══ */
    .total-card {
      background: var(--primary);
      margin: 0 16px;
      border-radius: 18px;
      padding: 16px 24px;
      text-align: center;
      border: 1.5px solid rgba(197,160,40,0.35);
      margin-bottom: 4px;
    }
    .total-number { font-size: 50px; font-weight: 900; color: var(--gold); line-height: 1; letter-spacing: -1px; }
    .total-label { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 5px; }

    /* ══ SCROLL AREA ══ */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      background: var(--beige);
      padding: 14px 16px 130px;
      -webkit-overflow-scrolling: touch;
    }
    .section-gap { height: 12px; }

    /* ══ PRAYERS CARD ══ */
    .prayers-card {
      background: var(--card);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow);
      margin-bottom: 14px;
    }
    .prayer-row {
      display: flex; flex-direction: row;
      align-items: center; justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .prayer-row:last-child { border-bottom: none; }
    .prayer-info { flex: 1; text-align: right; }
    .prayer-name { font-size: 17px; font-weight: 700; color: var(--primary); }
    .prayer-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .counter-section { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
    .count-display {
      min-width: 62px; text-align: center;
      font-size: 25px; font-weight: 900; color: var(--text);
      cursor: pointer; padding: 2px 4px; border-radius: 8px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .count-display:active { background: var(--beige); }
    .ctrl-btn {
      width: 37px; height: 37px; border-radius: 50%; border: none;
      cursor: pointer; font-size: 21px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0; line-height: 1;
    }
    .ctrl-btn:active { transform: scale(0.88); opacity: 0.8; }
    .ctrl-increment { background: var(--primary); color: #fff; }
    .ctrl-decrement { background: var(--border); color: var(--text-sec); }
    .ctrl-decrement:disabled { opacity: 0.32; cursor: default; }

    /* ══ VERSE CARD ══ */
    .verse-card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px 20px 14px;
      text-align: center;
      box-shadow: 0 1px 6px var(--shadow);
      margin-bottom: 10px;
    }
    .verse-text { font-size: 15px; font-weight: 700; color: var(--primary); line-height: 1.7; }
    .app-tag { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
    .tip { text-align: center; font-size: 12px; color: var(--text-muted); padding: 8px; }

    /* ══ FAB ROW ══ */
    .fab-row {
      position: fixed;
      bottom: 20px; left: 16px; right: 16px;
      display: flex; gap: 10px;
      z-index: 100;
    }
    .fab-btn {
      flex: 1; border: none; border-radius: 99px; padding: 15px 16px;
      font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: transform 0.1s, opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .fab-btn:active { transform: scale(0.97); opacity: 0.88; }
    .fab-share { background: var(--gold); color: #fff; box-shadow: 0 4px 16px rgba(197,160,40,0.45); }
    .fab-calc  { background: var(--primary); color: #fff; box-shadow: 0 4px 16px rgba(31,74,58,0.35); flex: 0 0 auto; width: 54px; padding: 0; font-size: 22px; }

    /* ══ NOTIFY BANNER ══ */
    .notify-banner {
      background: var(--info-bg);
      border-radius: 12px; padding: 11px 14px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
    }
    .notify-banner-text { font-size: 13px; color: var(--text-sec); flex: 1; }
    .notify-banner-btn {
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      padding: 7px 12px; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* ══ GENERIC MODAL ══ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-card {
      background: var(--card); border-radius: 22px; padding: 24px 20px;
      width: min(320px, 92vw);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      transform: scale(0.95) translateY(12px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--primary); text-align: center; }
    .modal-input {
      width: 100%; border: 2px solid var(--primary); border-radius: 12px; padding: 12px;
      font-family: 'Tajawal', sans-serif; font-size: 24px; font-weight: 800;
      color: var(--text); text-align: center; outline: none;
    }
    .modal-input:focus { border-color: var(--gold); }
    .modal-btns { display: flex; gap: 10px; width: 100%; }
    .modal-btn {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .modal-btn:active { opacity: 0.8; }
    .modal-btn-cancel  { background: var(--border); color: var(--text-sec); }
    .modal-btn-confirm { background: var(--primary); color: #fff; }
    .modal-btn-gold    { background: var(--gold); color: #fff; }
    .modal-btn-danger  { background: var(--danger); color: #fff; }

    /* ══ BOTTOM SHEET ══ */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: flex-end;
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--beige); border-radius: 26px 26px 0 0;
      width: 100%; max-height: 94dvh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .sheet-overlay.open .sheet { transform: translateY(0); }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sheet-title { font-size: 17px; font-weight: 700; color: var(--primary); flex: 1; text-align: center; }
    .sheet-icon-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
      font-size: 17px; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .sheet-icon-btn:active { opacity: 0.7; }
    .sheet-btn-close { background: var(--border); color: var(--text-sec); }
    .sheet-btn-gold  { background: rgba(197,160,40,0.18); color: var(--gold); font-size: 19px; }
    .sheet-btn-green { background: rgba(31,74,58,0.12); color: var(--primary); }
    .sheet-body { overflow-y: auto; padding: 14px 16px 24px; -webkit-overflow-scrolling: touch; }

    /* ══ SHAREABLE CARD ══ */
    .shareable-card {
      background: var(--beige); border-radius: 20px; padding: 22px 18px;
      width: 100%; max-width: 360px;
      border: 1px solid var(--border); box-shadow: 0 4px 16px var(--shadow);
    }
    .sc-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
    .sc-icon { width: 56px; height: 56px; object-fit: contain; margin-bottom: 6px; }
    .sc-title { font-size: 21px; font-weight: 800; color: var(--primary); }
    .sc-date { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .sc-total-box { background: var(--primary); border-radius: 14px; padding: 13px; text-align: center; margin-bottom: 12px; }
    .sc-total-num { font-size: 38px; font-weight: 900; color: var(--gold); line-height: 1; }
    .sc-total-lbl { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 4px; }
    .sc-rows-card { background: var(--card); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
    .sc-rows { display: flex; flex-direction: column; }
    .sc-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .sc-row:last-child { border-bottom: none; }
    .sc-row-name { font-size: 15px; font-weight: 700; color: var(--primary); }
    .sc-row-time { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .sc-row-count { font-size: 19px; font-weight: 900; color: var(--text); }
    .sc-verse { text-align: center; font-size: 13px; font-weight: 700; color: var(--primary); line-height: 1.8; }
    .sc-app-tag { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 5px; }
    .share-hint { font-size: 12px; color: var(--text-muted); text-align: center; padding: 0 16px; }

    /* ══ SHARE ACTIONS ══ */
    .share-actions { display: flex; gap: 10px; width: 100%; max-width: 360px; }
    .share-action-btn {
      flex: 1; padding: 12px 10px; border-radius: 14px; border: none;
      font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .share-action-btn:active { opacity: 0.8; }
    .btn-share-text { background: var(--primary); color: #fff; }
    .btn-share-pdf  { background: var(--gold); color: #fff; }

    /* ══ CALCULATOR SHEET ══ */
    .calc-intro {
      background: var(--info-bg); border-radius: 14px; padding: 14px 16px;
      margin-bottom: 16px; font-size: 14px; color: var(--text-sec); line-height: 1.7;
    }
    .calc-intro strong { color: var(--primary); }

    .calc-section-title {
      font-size: 15px; font-weight: 700; color: var(--primary);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }

    .period-card {
      background: var(--card); border-radius: 16px; padding: 14px 14px 12px;
      margin-bottom: 10px; box-shadow: 0 1px 6px var(--shadow);
      position: relative;
    }
    .period-label {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      margin-bottom: 10px;
    }
    .period-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .period-row label { font-size: 13px; color: var(--text-sec); flex-shrink: 0; min-width: 100px; }
    .period-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px;
      font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700;
      color: var(--text); text-align: center; outline: none; background: var(--beige);
      min-width: 0;
    }
    .period-input:focus { border-color: var(--primary); background: #fff; }
    .period-delete {
      position: absolute; top: 10px; left: 12px;
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--danger-bg); color: var(--danger);
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .period-delete:active { opacity: 0.7; }
    .period-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .add-period-btn {
      width: 100%; padding: 12px; border-radius: 14px; border: 2px dashed var(--primary);
      background: transparent; color: var(--primary);
      font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 16px; transition: background 0.15s;
    }
    .add-period-btn:active { background: var(--info-bg); }

    .calc-result {
      background: var(--primary); border-radius: 16px; padding: 16px;
      text-align: center; margin-bottom: 14px;
    }
    .calc-result-num { font-size: 42px; font-weight: 900; color: var(--gold); line-height: 1; }
    .calc-result-lbl { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 5px; }

    .calc-breakdown {
      background: var(--card); border-radius: 14px; overflow: hidden; margin-bottom: 14px;
    }
    .calc-breakdown-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .calc-breakdown-row:last-child { border-bottom: none; }
    .calc-breakdown-name { font-weight: 600; color: var(--primary); }
    .calc-breakdown-val { font-weight: 800; color: var(--text); }

    .calc-error {
      background: var(--danger-bg); border-radius: 12px; padding: 12px 14px;
      font-size: 13px; color: var(--danger); margin-bottom: 12px; text-align: center;
    }

    .calc-add-btn {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: var(--gold); color: #fff;
      font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .calc-add-btn:active { opacity: 0.85; }
    .calc-add-btn:disabled { opacity: 0.4; cursor: default; }

    /* ══ MEDIA – PRINT / PDF ══ */
    @media print {
      body > *:not(#printArea) { display: none !important; }
      #printArea {
        display: block !important;
        font-family: 'Tajawal', sans-serif;
        direction: rtl; padding: 0; margin: 0;
      }
      .print-page {
        width: 100%; max-width: 600px; margin: 0 auto;
        padding: 32px 24px;
      }
      .print-header { text-align: center; margin-bottom: 24px; }
      .print-mosque { font-size: 56px; margin-bottom: 4px; }
      .print-main-title { font-size: 26px; font-weight: 900; color: #1F4A3A; }
      .print-date { font-size: 13px; color: #9AA89F; margin-top: 4px; }
      .print-total-box {
        background: #1F4A3A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;
        border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 20px;
      }
      .print-total-num { font-size: 48px; font-weight: 900; color: #C5A028; line-height: 1; }
      .print-total-lbl { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 6px; }
      .print-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
      .print-table th, .print-table td {
        padding: 10px 14px; border-bottom: 1px solid #E8E2D4;
        font-size: 15px; text-align: right;
      }
      .print-table th { font-size: 12px; color: #9AA89F; font-weight: 600; }
      .print-table td:first-child { color: #1F4A3A; font-weight: 700; }
      .print-table td:last-child { font-weight: 900; font-size: 18px; color: #1A2E23; }
      .print-periods { margin-bottom: 20px; }
      .print-periods-title { font-size: 14px; color: #5A6B62; margin-bottom: 8px; }
      .print-period-row { font-size: 13px; color: #5A6B62; padding: 4px 0; border-bottom: 1px solid #F0EBE0; }
      .print-verse { text-align: center; font-size: 15px; font-weight: 700; color: #1F4A3A; line-height: 1.8; margin-top: 8px; }
      .print-footer { text-align: center; font-size: 11px; color: #9AA89F; margin-top: 6px; }
    }

    @media (max-width: 400px) {
      .total-number { font-size: 44px; }
      .ctrl-btn { width: 34px; height: 34px; font-size: 20px; }
      .count-display { font-size: 21px; min-width: 54px; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="header">
  <div class="header-actions">
    <button class="header-icon-btn" id="btnReset" title="إعادة تعيين" aria-label="إعادة تعيين">↺</button>
  </div>
  <img class="mosque-icon" src="mosque-icon.svg" alt="مسجد"
    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2250%22 font-size=%2248%22>🕌</text></svg>'" />
  <h1 class="header-title">قضاء الصلوات</h1>
  <p class="header-date" id="headerDate"></p>
</header>

<!-- ══ SCROLL AREA ══ -->
<main class="scroll-area">

  <!-- Total -->
  <div class="total-card">
    <div class="total-number" id="totalNumber">0</div>
    <div class="total-label">صلاة متبقية إجمالاً</div>
  </div>

  <div class="section-gap"></div>

  <!-- Notify Banner -->
  <div class="notify-banner" id="notifyBanner" style="display:none">
    <span class="notify-banner-text">فعّل الإشعارات لتلقي تذكير يومي بالصلوات الفائتة</span>
    <button class="notify-banner-btn" id="btnEnableNotify">تفعيل</button>
  </div>

  <!-- Prayers Card -->
  <div class="prayers-card" id="prayersCard"></div>

  <!-- Verse -->
  <div class="verse-card">
    <p class="verse-text">﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾</p>
    <p class="app-tag">تطبيق قضاء الصلوات</p>
  </div>

  <p class="tip">اضغط على الرقم لتعديله مباشرةً</p>
</main>

<!-- ══ FAB ROW ══ -->
<div class="fab-row">
  <button class="fab-btn fab-share" id="btnShare">
    <span>⎙</span><span>مشاركة التقرير</span>
  </button>
  <button class="fab-btn fab-calc" id="btnCalc" title="حاسبة السنوات" aria-label="حاسبة السنوات">🗓</button>
</div>

<!-- ══ EDIT MODAL ══ -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <h2 class="modal-title" id="editModalTitle">تعديل العداد</h2>
    <input class="modal-input" id="editInput" type="number" inputmode="numeric" min="0" autocomplete="off" />
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="editCancel">إلغاء</button>
      <button class="modal-btn modal-btn-confirm" id="editConfirm">تأكيد</button>
    </div>
  </div>
</div>

<!-- ══ SHARE SHEET ══ -->
<div class="sheet-overlay" id="shareSheet" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-header">
      <button class="sheet-icon-btn sheet-btn-close" id="shareSheetClose" aria-label="إغلاق">✕</button>
      <span class="sheet-title">مشاركة التقرير</span>
      <div style="width:34px"></div>
    </div>
    <div class="sheet-body" style="align-items:center;display:flex;flex-direction:column;gap:12px">
      <div class="shareable-card" id="shareableCard"></div>
      <div class="share-actions">
        <button class="share-action-btn btn-share-text" id="btnShareText">⎙ مشاركة نص</button>
        <button class="share-action-btn btn-share-pdf"  id="btnSharePdf">📄 تصدير PDF</button>
      </div>
      <p class="share-hint">PDF يُفتح في المتصفح — اختر "حفظ كـ PDF" من قائمة الطباعة</p>
    </div>
  </div>
</div>

<!-- ══ CALCULATOR SHEET ══ -->
<div class="sheet-overlay" id="calcSheet" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-header">
      <button class="sheet-icon-btn sheet-btn-close" id="calcSheetClose" aria-label="إغلاق">✕</button>
      <span class="sheet-title">حاسبة فترات الغياب</span>
      <div style="width:34px"></div>
    </div>
    <div class="sheet-body" id="calcSheetBody"></div>
  </div>
</div>

<!-- ══ PRINT AREA (hidden, shown only on print) ══ -->
<div id="printArea" style="display:none"></div>

<script>
'use strict';
// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const STORAGE_KEY = 'prayer_tracker_data_v2';
const CALC_KEY    = 'prayer_calc_periods_v1';

const PRAYERS = [
  { id: 'fajr',    name: 'الفجر',   time: 'قبل الشروق'   },
  { id: 'dhuhr',   name: 'الظهر',   time: 'منتصف النهار' },
  { id: 'asr',     name: 'العصر',   time: 'بعد الظهر'    },
  { id: 'maghrib', name: 'المغرب',  time: 'عند الغروب'   },
  { id: 'isha',    name: 'العشاء',  time: 'بعد العشاء'   },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state = {
  version: 2,
  lastUpdated: new Date().toISOString(),
  lastInteractionDate: '',
  prayers: { fajr:0, dhuhr:0, asr:0, maghrib:0, isha:0 },
};

// Calculator periods: [{from: number, to: number}]
// "from" = age when stopped praying, "to" = age when resumed
let calcPeriods = [];

// ══════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...state, ...parsed, prayers: { ...state.prayers, ...parsed.prayers } };
    }
    const rawCalc = localStorage.getItem(CALC_KEY);
    if (rawCalc) calcPeriods = JSON.parse(rawCalc);
  } catch { /* ignore */ }
}

function saveData() {
  try {
    state.lastUpdated = new Date().toISOString();
    state.lastInteractionDate = new Date().toISOString().split('T')[0];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch { /* ignore */ }
}

function saveCalcPeriods() {
  try { localStorage.setItem(CALC_KEY, JSON.stringify(calcPeriods)); } catch { /* ignore */ }
}

// ══════════════════════════════════════════════
//  PRAYER COUNTER LOGIC
// ══════════════════════════════════════════════
function updateCount(prayerId, delta) {
  const next = (state.prayers[prayerId] ?? 0) + delta;
  if (next < 0) return;
  state.prayers[prayerId] = next;
  saveData(); renderCounters(); renderTotal();
}

function setCount(prayerId, value) {
  state.prayers[prayerId] = Math.max(0, parseInt(value, 10) || 0);
  saveData(); renderCounters(); renderTotal();
}

function addToPrayers(perPrayer) {
  // perPrayer = total days per each prayer type
  PRAYERS.forEach(p => {
    state.prayers[p.id] = (state.prayers[p.id] ?? 0) + Math.round(perPrayer);
  });
  saveData(); renderCounters(); renderTotal();
}

function resetAll() {
  if (!confirm('هل تريد إعادة تعيين جميع الصلوات إلى الصفر؟')) return;
  PRAYERS.forEach(p => { state.prayers[p.id] = 0; });
  saveData(); renderCounters(); renderTotal();
}

// ══════════════════════════════════════════════
//  RENDER – MAIN
// ══════════════════════════════════════════════
function getTotal() { return Object.values(state.prayers).reduce((s,v) => s+v, 0); }
function fmtAr(n)   { return Math.round(n).toLocaleString('ar-EG'); }

function renderTotal() {
  document.getElementById('totalNumber').textContent = fmtAr(getTotal());
}

function renderCounters() {
  PRAYERS.forEach(p => {
    const el = document.getElementById('cnt_' + p.id);
    if (el) el.textContent = fmtAr(state.prayers[p.id] ?? 0);
    const dec = document.getElementById('dec_' + p.id);
    if (dec) dec.disabled = (state.prayers[p.id] ?? 0) <= 0;
  });
}

function buildPrayersCard() {
  const card = document.getElementById('prayersCard');
  card.innerHTML = '';
  PRAYERS.forEach(p => {
    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.innerHTML = `
      <div class="prayer-info">
        <div class="prayer-name">${p.name}</div>
        <div class="prayer-time">${p.time}</div>
      </div>
      <div class="counter-section">
        <button class="ctrl-btn ctrl-increment" id="inc_${p.id}" aria-label="زيادة ${p.name}">+</button>
        <div class="count-display" id="cnt_${p.id}" role="button" tabindex="0" aria-label="تعديل ${p.name}">0</div>
        <button class="ctrl-btn ctrl-decrement" id="dec_${p.id}" aria-label="إنقاص ${p.name}" disabled>−</button>
      </div>`;
    card.appendChild(row);
    row.querySelector('#inc_' + p.id).addEventListener('click', () => updateCount(p.id, 1));
    row.querySelector('#dec_' + p.id).addEventListener('click', () => updateCount(p.id, -1));
    const cntEl = row.querySelector('#cnt_' + p.id);
    cntEl.addEventListener('click', () => openEditModal(p));
    cntEl.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openEditModal(p); });
  });
}

// ══════════════════════════════════════════════
//  EDIT MODAL
// ══════════════════════════════════════════════
let currentEditId = null;

function openEditModal(prayer) {
  currentEditId = prayer.id;
  document.getElementById('editModalTitle').textContent = 'تعديل عدد ' + prayer.name;
  document.getElementById('editInput').value = state.prayers[prayer.id] ?? 0;
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editInput').focus(), 120);
}
function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  currentEditId = null;
}
function confirmEdit() {
  if (!currentEditId) return;
  setCount(currentEditId, document.getElementById('editInput').value);
  closeEditModal();
}

document.getElementById('editCancel').addEventListener('click', closeEditModal);
document.getElementById('editConfirm').addEventListener('click', confirmEdit);
document.getElementById('editInput').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmEdit();
  if (e.key==='Escape') closeEditModal();
});
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEditModal();
});

// ══════════════════════════════════════════════
//  SHARE SHEET
// ══════════════════════════════════════════════
function buildShareableCard() {
  const dateStr = new Date().toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });
  const rows = PRAYERS.map(p => `
    <div class="sc-row">
      <div><div class="sc-row-name">${p.name}</div><div class="sc-row-time">${p.time}</div></div>
      <div class="sc-row-count">${fmtAr(state.prayers[p.id] ?? 0)}</div>
    </div>`).join('');
  document.getElementById('shareableCard').innerHTML = `
    <div class="sc-header">
      <img class="sc-icon" src="mosque-icon.svg" alt="🕌"
        onerror="this.outerHTML='<div style=&quot;font-size:48px;margin-bottom:6px&quot;>🕌</div>'"/>
      <div class="sc-title">قضاء الصلوات</div>
      <div class="sc-date">${dateStr}</div>
    </div>
    <div class="sc-total-box">
      <div class="sc-total-num">${fmtAr(getTotal())}</div>
      <div class="sc-total-lbl">صلاة متبقية إجمالاً</div>
    </div>
    <div class="sc-rows-card"><div class="sc-rows">${rows}</div></div>
    <div class="sc-verse">﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾</div>
    <div class="sc-app-tag">تطبيق قضاء الصلوات</div>`;
}

document.getElementById('btnShare').addEventListener('click', () => {
  buildShareableCard();
  document.getElementById('shareSheet').classList.add('open');
});
document.getElementById('shareSheetClose').addEventListener('click', () => {
  document.getElementById('shareSheet').classList.remove('open');
});
document.getElementById('shareSheet').addEventListener('click', e => {
  if (e.target === e.currentTarget)
    document.getElementById('shareSheet').classList.remove('open');
});

// Share as text
document.getElementById('btnShareText').addEventListener('click', async () => {
  const dateStr = new Date().toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });
  const lines = PRAYERS.map(p => `${p.name}: ${state.prayers[p.id]??0} صلاة`).join('\n');
  const text = [
    `🕌 قضاء الصلوات — ${dateStr}`,
    ``,
    `إجمالي الصلوات المتبقية: ${getTotal()}`,
    ``,
    lines,
    ``,
    `﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾`,
    `تطبيق قضاء الصلوات`,
  ].join('\n');
  if (navigator.share) {
    try { await navigator.share({ title:'تقرير الصلوات الفائتة', text }); } catch { /* cancelled */ }
  } else {
    try { await navigator.clipboard.writeText(text); alert('تم نسخ التقرير! يمكنك لصقه في أي تطبيق.'); }
    catch { alert(text); }
  }
});

// ══════════════════════════════════════════════
//  PDF EXPORT via browser print
// ══════════════════════════════════════════════
document.getElementById('btnSharePdf').addEventListener('click', () => {
  generatePrintArea();
  document.getElementById('shareSheet').classList.remove('open');
  setTimeout(() => window.print(), 300);
});

function generatePrintArea() {
  const dateStr = new Date().toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });

  // Build periods section for PDF if available
  let periodsHtml = '';
  const validPeriods = calcPeriods.filter(p => p.from && p.to && p.to > p.from);
  if (validPeriods.length > 0) {
    const pRows = validPeriods.map(p => {
      const yrs = p.to - p.from;
      return `<div class="print-period-row">من عمر ${p.from} إلى ${p.to} سنة — ${yrs} سنة (${Math.round(yrs*365)} يوم)</div>`;
    }).join('');
    periodsHtml = `
      <div class="print-periods">
        <div class="print-periods-title">فترات الغياب المحتسبة:</div>
        ${pRows}
      </div>`;
  }

  const tableRows = PRAYERS.map(p => `
    <tr>
      <td>${p.name}</td>
      <td style="color:#9AA89F;font-size:12px">${p.time}</td>
      <td style="text-align:left">${(state.prayers[p.id]??0).toLocaleString('ar-EG')}</td>
    </tr>`).join('');

  document.getElementById('printArea').innerHTML = `
    <div class="print-page">
      <div class="print-header">
        <div class="print-mosque">🕌</div>
        <div class="print-main-title">قضاء الصلوات</div>
        <div class="print-date">${dateStr}</div>
      </div>
      <div class="print-total-box">
        <div class="print-total-num">${getTotal().toLocaleString('ar-EG')}</div>
        <div class="print-total-lbl">صلاة متبقية إجمالاً</div>
      </div>
      <table class="print-table">
        <thead>
          <tr>
            <th>الصلاة</th>
            <th>الوقت</th>
            <th style="text-align:left">العدد</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
      ${periodsHtml}
      <div class="print-verse">﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾</div>
      <div class="print-footer">تطبيق قضاء الصلوات — ${dateStr}</div>
    </div>`;
}

// ══════════════════════════════════════════════
//  YEARS CALCULATOR SHEET
// ══════════════════════════════════════════════
function openCalcSheet() {
  renderCalcSheet();
  document.getElementById('calcSheet').classList.add('open');
}

function closeCalcSheet() {
  document.getElementById('calcSheet').classList.remove('open');
}

document.getElementById('btnCalc').addEventListener('click', openCalcSheet);
document.getElementById('calcSheetClose').addEventListener('click', closeCalcSheet);
document.getElementById('calcSheet').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCalcSheet();
});

function addPeriod() {
  calcPeriods.push({ from: '', to: '' });
  saveCalcPeriods();
  renderCalcSheet();
}

function removePeriod(index) {
  calcPeriods.splice(index, 1);
  saveCalcPeriods();
  renderCalcSheet();
}

function updatePeriod(index, field, value) {
  calcPeriods[index][field] = value === '' ? '' : parseFloat(value) || '';
  saveCalcPeriods();
  // Re-render only the result area to avoid losing focus
  renderCalcResult();
}

function calcTotalDays() {
  let totalDays = 0;
  const errors = [];
  const validPeriods = [];

  calcPeriods.forEach((p, i) => {
    const from = parseFloat(p.from);
    const to   = parseFloat(p.to);

    if (isNaN(from) || isNaN(to)) return; // skip incomplete
    if (from < 0 || to < 0)       { errors.push(`الفترة ${i+1}: الأعمار يجب أن تكون موجبة`); return; }
    if (from >= to)                { errors.push(`الفترة ${i+1}: عمر العودة يجب أن يكون أكبر من عمر الترك`); return; }
    if (from < 7)                  { errors.push(`الفترة ${i+1}: عمر الترك غير منطقي (أقل من 7 سنوات)`); return; }
    if (to - from > 80)            { errors.push(`الفترة ${i+1}: الفترة تبدو طويلة جداً، تأكد من الأرقام`); return; }

    const days = (to - from) * 365.25;
    totalDays += days;
    validPeriods.push({ from, to, days });
  });

  return { totalDays, errors, validPeriods };
}

function renderCalcResult() {
  const resultEl = document.getElementById('calcResultArea');
  if (!resultEl) return;

  const { totalDays, errors, validPeriods } = calcTotalDays();
  const totalPrayers = Math.round(totalDays) * 5;
  const perPrayer    = Math.round(totalDays);
  const hasValid = validPeriods.length > 0;

  let html = '';

  if (errors.length > 0) {
    html += errors.map(e => `<div class="calc-error">⚠️ ${e}</div>`).join('');
  }

  if (hasValid) {
    html += `
      <div class="calc-result">
        <div class="calc-result-num">${totalPrayers.toLocaleString('ar-EG')}</div>
        <div class="calc-result-lbl">إجمالي الصلوات المحتسبة</div>
      </div>
      <div class="calc-breakdown">`;

    validPeriods.forEach(p => {
      const yrs = (p.to - p.from).toFixed(p.to - p.from === Math.round(p.to - p.from) ? 0 : 1);
      html += `
        <div class="calc-breakdown-row">
          <span class="calc-breakdown-name">من ${p.from} إلى ${p.to} سنة</span>
          <span class="calc-breakdown-val">${Math.round(p.days * 5).toLocaleString('ar-EG')} صلاة</span>
        </div>`;
    });

    if (validPeriods.length > 1) {
      html += `
        <div class="calc-breakdown-row" style="background:rgba(31,74,58,0.05)">
          <span class="calc-breakdown-name" style="color:var(--text-muted)">لكل صلاة واحدة</span>
          <span class="calc-breakdown-val">${perPrayer.toLocaleString('ar-EG')} يوم</span>
        </div>`;
    }
    html += `</div>`;
  }

  html += `
    <button class="calc-add-btn" id="calcAddBtn" ${!hasValid || errors.length ? 'disabled' : ''}>
      ＋ إضافة ${hasValid ? totalPrayers.toLocaleString('ar-EG') : ''} صلاة للعداد
    </button>`;

  resultEl.innerHTML = html;

  if (hasValid && !errors.length) {
    document.getElementById('calcAddBtn').addEventListener('click', () => {
      if (!confirm(`هل تريد إضافة ${totalPrayers.toLocaleString('ar-EG')} صلاة موزعةً على الصلوات الخمس؟`)) return;
      addToPrayers(perPrayer);
      closeCalcSheet();
    });
  }
}

function renderCalcSheet() {
  const body = document.getElementById('calcSheetBody');

  let periodsHtml = calcPeriods.map((p, i) => `
    <div class="period-card" id="period_${i}">
      <div class="period-label">الفترة ${i + 1}</div>
      <button class="period-delete" onclick="removePeriod(${i})" aria-label="حذف الفترة">✕</button>
      <div class="period-row">
        <label>عمر الترك (سنة)</label>
        <input class="period-input" type="number" inputmode="decimal" min="7" max="120"
          placeholder="مثال: 15"
          value="${p.from !== '' ? p.from : ''}"
          onchange="updatePeriod(${i}, 'from', this.value)"
          oninput="updatePeriod(${i}, 'from', this.value)" />
      </div>
      <div class="period-row">
        <label>عمر العودة (سنة)</label>
        <input class="period-input" type="number" inputmode="decimal" min="7" max="120"
          placeholder="مثال: 20"
          value="${p.to !== '' ? p.to : ''}"
          onchange="updatePeriod(${i}, 'to', this.value)"
          oninput="updatePeriod(${i}, 'to', this.value)" />
      </div>
      <div class="period-note">
        ${(p.from && p.to && p.to > p.from)
          ? `📅 ${p.to - p.from} سنة × 365 يوم × 5 صلوات = <strong>${Math.round((p.to - p.from) * 365.25 * 5).toLocaleString('ar-EG')} صلاة</strong>`
          : 'أدخل عمر الترك وعمر العودة لحساب عدد الصلوات'}
      </div>
    </div>`).join('');

  body.innerHTML = `
    <div class="calc-intro">
      <strong>كيف تعمل الحاسبة؟</strong><br>
      أدخل كل فترة توقفت فيها عن الصلاة — من العمر الذي تركت فيه الصلاة، إلى العمر الذي عدت فيه إليها.
      ستحسب الحاسبة عدد الأيام × 5 صلوات يومياً وتضيف الناتج لعداد كل صلاة.<br><br>
      <strong>مثال:</strong> تركت الصلاة عمر 15 وعدت عمر 20 = 5 سنوات × 365 = 1825 يوم لكل صلاة.
    </div>

    <div class="calc-section-title">📋 فترات الغياب</div>
    ${periodsHtml}

    <button class="add-period-btn" onclick="addPeriod()">＋ إضافة فترة جديدة</button>

    <div id="calcResultArea"></div>
  `;

  renderCalcResult();
}

// ══════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════
document.getElementById('btnReset').addEventListener('click', resetAll);

// ══════════════════════════════════════════════
//  DATE
// ══════════════════════════════════════════════
function renderDate() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ar-SA', {
    year:'numeric', month:'long', day:'numeric',
  });
}

// ══════════════════════════════════════════════
//  NOTIFICATIONS
// ══════════════════════════════════════════════
function checkNotifyBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default')
    document.getElementById('notifyBanner').style.display = 'flex';
}

document.getElementById('btnEnableNotify').addEventListener('click', async () => {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  document.getElementById('notifyBanner').style.display = 'none';
  if (perm === 'granted') maybeShowNotification();
});

function maybeShowNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toISOString().split('T')[0];
  if (state.lastInteractionDate && state.lastInteractionDate >= today) return;
  if (new Date().getHours() >= 20) {
    new Notification('تذكير — قضاء الصلوات', {
      body: 'هل قمت بتسجيل صلواتك الفائتة اليوم؟',
      icon: 'mosque-icon.svg',
    });
  }
}

// ══════════════════════════════════════════════
//  SERVICE WORKER
// ══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
loadData();
renderDate();
buildPrayersCard();
renderCounters();
renderTotal();
checkNotifyBanner();
maybeShowNotification();
</script>
</body>
</html>
