<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="60" fill="#1F4A3A"/>

  <!-- Main dome -->
  <ellipse cx="60" cy="68" rx="30" ry="22" fill="#C5A028"/>
  <rect x="30" y="68" width="60" height="22" fill="#C5A028"/>

  <!-- Door arch -->
  <rect x="51" y="76" width="18" height="14" rx="9" fill="#1F4A3A"/>

  <!-- Left minaret -->
  <rect x="22" y="62" width="10" height="28" fill="#D4B84A"/>
  <polygon points="27,52 22,62 32,62" fill="#C5A028"/>
  <circle cx="27" cy="51" r="2.5" fill="#F5F0E6"/>

  <!-- Right minaret -->
  <rect x="88" y="62" width="10" height="28" fill="#D4B84A"/>
  <polygon points="93,52 88,62 98,62" fill="#C5A028"/>
  <circle cx="93" cy="51" r="2.5" fill="#F5F0E6"/>

  <!-- Main dome top spire -->
  <line x1="60" y1="46" x2="60" y2="38" stroke="#C5A028" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="60" cy="37" r="3" fill="#C5A028"/>

  <!-- Windows on dome -->
  <ellipse cx="47" cy="68" rx="5" ry="6" fill="#1F4A3A" opacity="0.4"/>
  <ellipse cx="73" cy="68" rx="5" ry="6" fill="#1F4A3A" opacity="0.4"/>

  <!-- Ground line -->
  <rect x="18" y="90" width="84" height="4" rx="2" fill="#163529"/>

  <!-- Stars -->
  <text x="38" y="36" font-size="10" fill="#C5A028" text-anchor="middle">★</text>
  <text x="82" y="36" font-size="10" fill="#C5A028" text-anchor="middle">★</text>
</svg>
